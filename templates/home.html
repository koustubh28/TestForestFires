<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FWI Prediction Form</title>
    <style>
      :root {
        --primary-color: #2563eb;
        --primary-hover: #1d4ed8;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: #cbd5e1;
        --focus-ring: #93c5fd;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 2rem 1rem;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
      }

      *,
      *:before,
      *:after {
        box-sizing: inherit;
      }

      .form-container {
        background: var(--card-bg);
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1),
          0 2px 4px -2px rgb(0 0 0 / 0.1);
        width: 100%;
        max-width: 650px;
      }

      h1 {
        font-size: 1.8rem;
        margin-top: 0;
        margin-bottom: 0.5rem;
        color: var(--text-main);
        text-align: center;
      }

      .subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 2rem;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.25rem;
        margin-bottom: 2rem;
      }

      /* Full width for specific fields if needed, or collapse on mobile */
      @media (max-width: 600px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      /* Spanning the result section across full width */
      .full-width {
        grid-column: span 2;
      }
      @media (max-width: 600px) {
        .full-width {
          grid-column: span 1;
        }
      }

      label {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-main);
      }

      input[type="number"] {
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 1rem;
        color: var(--text-main);
        background-color: #fff;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      input[type="number"]:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px var(--focus-ring);
      }

      input[type="number"]::placeholder {
        color: var(--text-muted);
        opacity: 0.6;
      }

      .btn-submit {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 0.85rem;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.15s ease;
      }

      .btn-submit:hover {
        background-color: var(--primary-hover);
      }

      .result-box {
        margin-top: 2rem;
        padding: 1.25rem;
        background-color: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 6px;
        text-align: center;
      }

      .result-box h2 {
        margin: 0;
        font-size: 1.1rem;
        color: #166534;
        font-weight: 600;
      }

      .result-value {
        color: #15803d;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h1>FWI Prediction</h1>
      <p class="subtitle">
        Enter the meteorological and fire index parameters below
      </p>

      <form action="{{ url_for('predict_datapoint') }}" method="post">
        <div class="form-grid">
          <div class="form-group">
            <label for="Temperature">Temperature</label>
            <input
              type="number"
              id="Temperature"
              name="Temperature"
              step="any"
              placeholder="e.g., 32"
              required
            />
          </div>

          <div class="form-group">
            <label for="RH">Relative Humidity (RH)</label>
            <input
              type="number"
              id="RH"
              name="RH"
              step="any"
              placeholder="e.g., 45"
              required
            />
          </div>

          <div class="form-group">
            <label for="Ws">Wind Speed (Ws)</label>
            <input
              type="number"
              id="Ws"
              name="Ws"
              step="any"
              placeholder="e.g., 14"
              required
            />
          </div>

          <div class="form-group">
            <label for="Rain">Rain</label>
            <input
              type="number"
              id="Rain"
              name="Rain"
              step="any"
              placeholder="e.g., 0.2"
              required
            />
          </div>

          <div class="form-group">
            <label for="FFMC">FFMC</label>
            <input
              type="number"
              id="FFMC"
              name="FFMC"
              step="any"
              placeholder="Fine Fuel Moisture Code"
              required
            />
          </div>

          <div class="form-group">
            <label for="DMC">DMC</label>
            <input
              type="number"
              id="DMC"
              name="DMC"
              step="any"
              placeholder="Duff Moisture Code"
              required
            />
          </div>

          <div class="form-group">
            <label for="ISI">ISI</label>
            <input
              type="number"
              id="ISI"
              name="ISI"
              step="any"
              placeholder="Initial Spread Index"
              required
            />
          </div>

          <div class="form-group">
            <label for="Classes">Classes</label>
            <input
              type="number"
              id="Classes"
              name="Classes"
              step="any"
              placeholder="e.g., 0 or 1"
              required
            />
          </div>

          <div class="form-group full-width">
            <label for="Region">Region</label>
            <input
              type="number"
              id="Region"
              name="Region"
              step="any"
              placeholder="Specify region index"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn-submit">Predict FWI</button>
      </form>

      <!-- Jinja logic placeholder for results -->
      {% if results is defined %}
      <div class="result-box">
        <h2>
          THE FWI prediction is: <span class="result-value">{{ results }}</span>
        </h2>
      </div>
      {% endif %}
    </div>
  </body>
</html>
